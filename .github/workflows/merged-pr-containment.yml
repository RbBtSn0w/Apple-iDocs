name: Merged PR Containment

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Audit merged PR containment
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: main
          PR_LIMIT: 50
          # Audit the full recent history instead of a blanket date floor.
          # #4: recorded merge SHA was orphaned by a history rewrite; the content
          # still landed on main (450cf0d). See docs/release/merged-pr-containment.md.
          EXCLUDE_PRS: "4"
        run: bash ./scripts/audit-merged-pr-containment.sh
