name: Merged PR Containment

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Audit merged PR containment
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: main
          PR_LIMIT: 50
        run: bash ./scripts/audit-merged-pr-containment.sh
