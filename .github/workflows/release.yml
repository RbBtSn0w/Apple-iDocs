name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write # for creating tags and releases
  id-token: write # for npm provenance and trusted publishing
  issues: write   # for automated issue management
  pull-requests: write # for automated PR comments
  packages: write # for GitHub Packages

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Tuist
        uses: ./.github/actions/setup-tuist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install Release Plugins
        run: |
          cd npm
          npm install -D \
            semantic-release@25 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/npm \
            @semantic-release/github \
            @semantic-release/git

      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          cd npm
          npx semantic-release@25

      - name: Dual Publish to GitHub Packages
        if: success()
        run: |
          cd npm
          # Follow the exact pattern from wechat-publisher
          echo "@rbbtsn0w:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          npm publish --registry https://npm.pkg.github.com || echo "GitHub Packages: Version already exists or nothing to publish."
