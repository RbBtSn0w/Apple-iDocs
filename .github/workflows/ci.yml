name: iDocs CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    timeout-minutes: 30
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Tuist
        run: curl -Ls https://install.tuist.io | bash
        
      - name: Tuist Install
        run: tuist install
        
      - name: Build CLI
        run: ./scripts/tuist-silent.sh build iDocs
        
      - name: Run Default Tests
        run: ./scripts/tuist-silent.sh test

  arch-gate:
    timeout-minutes: 10
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run architecture gate checks
        run: ./scripts/arch-gate.sh

  e2e-cli-offline:
    timeout-minutes: 30
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Tuist
        run: curl -Ls https://install.tuist.io | bash

      - name: Install Node dependencies for npm wrapper
        run: npm --prefix npm ci

      - name: Run iDocs CLI E2E (offline deterministic gate)
        run: ./scripts/e2e-cli.sh offline
