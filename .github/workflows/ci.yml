name: iDocs CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IDOCS_DERIVED_DATA_PATH: ${{ github.workspace }}/.deriveddata

jobs:
  build-and-test:
    timeout-minutes: 30
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tuist
        uses: ./.github/actions/setup-tuist

      - name: Build CLI
        run: ./scripts/tuist-silent.sh build iDocs

      - name: Verify Binary
        run: |
          ls -l $IDOCS_DERIVED_DATA_PATH/Build/Products/Debug/idocs
          file $IDOCS_DERIVED_DATA_PATH/Build/Products/Debug/idocs

      - name: Run Default Test Suite
        run: ./scripts/tuist-silent.sh test
        env:
          IDOCS_LOCAL_BINARY: ${{ env.IDOCS_DERIVED_DATA_PATH }}/Build/Products/Debug/idocs
          IDOCS_PROJECT_ROOT: ${{ github.workspace }}
          GITHUB_WORKSPACE: ${{ github.workspace }}

  e2e-cli-offline:
    timeout-minutes: 30
    runs-on: macos-15
    env:
      IDOCS_LOCAL_BINARY: ${{ github.workspace }}/.deriveddata/Build/Products/Debug/idocs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tuist
        uses: ./.github/actions/setup-tuist

      - name: Build CLI for E2E
        run: ./scripts/tuist-silent.sh build iDocs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install Node dependencies for npm wrapper
        run: npm --prefix npm ci

      - name: Run iDocs CLI E2E (offline deterministic gate)
        run: IDOCS_NPM_STRICT_INSTALL=1 ./scripts/e2e-cli.sh offline

  release:
    name: Build and Release
    needs: [build-and-test, e2e-cli-offline]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: macos-15
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      packages: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Tuist
        uses: ./.github/actions/setup-tuist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Stage GitHub Release Assets
        run: ./scripts/release-package.sh staged "$GITHUB_WORKSPACE/dist/release/staged"

      - name: Verify Staged Release Assets
        run: |
          ls -l "$GITHUB_WORKSPACE/dist/release/staged"
          test -f "$GITHUB_WORKSPACE/dist/release/staged/idocs-darwin-arm64.tar.gz"
          test -f "$GITHUB_WORKSPACE/dist/release/staged/idocs-darwin-arm64.sha256"

      - name: Install Release Plugins
        run: |
          cd npm
          npm install -D \
            semantic-release@25 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/npm \
            @semantic-release/github \
            @semantic-release/git

      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          cd npm
          npx semantic-release@25

      - name: Dual Publish to Registries
        if: success()
        run: |
          cd npm
          # 1. Publish to npmjs.org using Trusted Publishing (OIDC)
          # No token needed, relies on id-token: write and provenance flag
          npm publish --provenance --access public || echo "npmjs.org: Version already exists or nothing to publish."

          # 2. Publish to GitHub Packages
          # Use npm config for safer registry authentication
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
          npm publish --registry https://npm.pkg.github.com || echo "GitHub Packages: Version already exists or nothing to publish."
