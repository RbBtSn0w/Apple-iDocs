name: iDocs CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    timeout-minutes: 30
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tuist
        uses: ./.github/actions/setup-tuist

      - name: Build CLI
        run: ./scripts/tuist-silent.sh build iDocs

      - name: Verify Binary
        run: |
          ls -l $HOME/Library/Developer/Xcode/DerivedData/iDocs-codex/Build/Products/Debug/idocs
          file $HOME/Library/Developer/Xcode/DerivedData/iDocs-codex/Build/Products/Debug/idocs

      - name: Run Default Tests
        run: ./scripts/tuist-silent.sh test
        env:
          IDOCS_LOCAL_BINARY: /Users/runner/Library/Developer/Xcode/DerivedData/iDocs-codex/Build/Products/Debug/idocs
          GITHUB_WORKSPACE: ${{ github.workspace }}

  e2e-cli-offline:
    timeout-minutes: 30
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tuist
        uses: ./.github/actions/setup-tuist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: npm/package-lock.json

      - name: Install Node dependencies for npm wrapper
        run: npm --prefix npm ci

      - name: Run iDocs CLI E2E (offline deterministic gate)
        run: IDOCS_NPM_STRICT_INSTALL=1 ./scripts/e2e-cli.sh offline
