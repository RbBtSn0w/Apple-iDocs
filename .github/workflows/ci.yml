name: iDocs CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    timeout-minutes: 30
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Tuist
        run: brew install tuist
        
      - name: Tuist Install
        run: tuist install
        
      - name: Build CLI
        run: ./scripts/tuist-silent.sh build iDocs
        
      - name: Run Default Tests
        run: ./scripts/tuist-silent.sh test

  arch-gate:
    timeout-minutes: 10
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run architecture gate checks
        run: ./scripts/arch-gate.sh

  e2e-cli-offline:
    timeout-minutes: 30
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.0
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Install Tuist
        run: brew install tuist

      - name: Install Node dependencies for npm wrapper
        run: npm --prefix npm ci

      - name: Run iDocs CLI E2E (offline deterministic gate)
        run: IDOCS_NPM_STRICT_INSTALL=1 ./scripts/e2e-cli.sh offline
